<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polirobots Dagaforce: Autons Maker</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0a0e14;
      --surface:   #111827;
      --border:    #1f2d40;
      --accent:    #00d4ff;
      --accent2:   #ff4d4d;
      --text:      #c9d1d9;
      --muted:     #4a5568;
      --field-bg:  #0d1a10;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    header {
      width: 100%;
      max-width: 780px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
    }

    header span {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .legend {
      display: flex;
      gap: 24px;
      margin-bottom: 8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
    }

    .legend-swatch { width: 28px; height: 3px; border-radius: 2px; }
    .swatch-tile   { background: var(--accent); }
    .swatch-inch   { background: rgba(255,255,255,0.25); }
    .swatch-border { background: var(--accent2); }

    #imgStatus {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      padding: 3px 10px;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    #imgStatus.ok      { color: #4ade80; border: 1px solid #4ade8044; }
    #imgStatus.err     { color: #f87171; border: 1px solid #f8717144; }
    #imgStatus.loading { color: var(--muted); border: 1px solid var(--border); }

    .field-wrapper {
      position: relative;
      border: 2px solid var(--accent2);
      box-shadow: 0 0 0 1px var(--border),
                  0 0 32px rgba(255, 77, 77, 0.15);
    }

    canvas { display: block; }

    .ruler-x {
      display: flex;
      justify-content: space-between;
      width: 576px;
      margin-bottom: 4px;
      padding: 0 2px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .ruler-y-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .ruler-y {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 576px;
      padding: 2px 0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-align: right;
    }

    .info-bar {
      margin-top: 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 1px;
      display: flex;
      gap: 32px;
    }

    .info-bar span { color: var(--accent); }
  </style>
</head>
<body>

  <header>
    <h1>Dagaforce Tool</h1>
    <span>By: DevMaxD</span>
  </header>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-tile"></div>Línea de azulejo (2 ft)</div>
    <div class="legend-item"><div class="legend-swatch swatch-inch"></div>Línea de pulgada (1 in)</div>
    <div class="legend-item"><div class="legend-swatch swatch-border"></div>Borde del campo</div>
  </div>

  <div id="imgStatus" class="loading">⏳ Cargando TOP.png…</div>

  <div class="ruler-x" id="rulerX"></div>

  <div class="ruler-y-wrapper">
    <div class="ruler-y" id="rulerY"></div>

    <div class="field-wrapper">
      <canvas id="field" width="576" height="576"></canvas>
    </div>
  </div>

  <div class="info-bar">
    <div>CAMPO: <span>144 × 144 in</span></div>
    <div>TILES: <span>6 × 6</span></div>
    <div>ESCALA: <span>4 px / in</span></div>
    <div>CURSOR: <span id="cursorPos">—</span></div>
  </div>

<script>
  const FIELD_IN = 144;
  const TILE_IN  = 24;
  const SCALE    = 4;
  const SIZE_PX  = FIELD_IN * SCALE; // 576

  const canvas = document.getElementById('field');
  const ctx    = canvas.getContext('2d');
  const status = document.getElementById('imgStatus');

  /* ─────────────────────────────────────────
     Carga TOP.png (misma carpeta que el HTML)
     4320×4320 px → se escala a 576×576 en el canvas
  ───────────────────────────────────────── */
  const fieldImg = new Image();

  fieldImg.onload = () => {
    status.className  = 'ok';
    status.textContent = `✔ TOP.png cargada (${fieldImg.naturalWidth}×${fieldImg.naturalHeight}px → escalada a ${SIZE_PX}×${SIZE_PX}px)`;
    render(fieldImg);
  };

  fieldImg.onerror = () => {
    status.className  = 'err';
    status.textContent = '✘ TOP.png no encontrada — mostrando campo vacío';
    render(null);
  };

  fieldImg.src = 'TOP.png';

  /* ── Render completo ── */
  function render(img) {
    ctx.clearRect(0, 0, SIZE_PX, SIZE_PX);

    // ① Fondo: imagen del campo escalada exactamente al canvas
    if (img) {
      ctx.drawImage(img, 0, 0, SIZE_PX, SIZE_PX);
    } else {
      ctx.fillStyle = '#0d1a10';
      ctx.fillRect(0, 0, SIZE_PX, SIZE_PX);
    }

    // ② Grid de pulgadas
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth   = 0.5;
    for (let i = 1; i < FIELD_IN; i++) {
      if (i % TILE_IN === 0) continue;
      const p = i * SCALE;
      ctx.beginPath(); ctx.moveTo(p, 0);      ctx.lineTo(p, SIZE_PX); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, p);      ctx.lineTo(SIZE_PX, p); ctx.stroke();
    }

    // ③ Vértices de pulgadas (puntos pequeños)
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    for (let x = 0; x <= FIELD_IN; x++) {
      for (let y = 0; y <= FIELD_IN; y++) {
        if (x % TILE_IN === 0 && y % TILE_IN === 0) continue;
        ctx.fillRect(x * SCALE - 0.75, y * SCALE - 0.75, 1.5, 1.5);
      }
    }

    // ④ Grid de tiles (cada 24 in = 2 ft)
    ctx.strokeStyle = 'rgba(0, 212, 255, 0.35)';
    ctx.lineWidth   = 1.2;
    for (let i = 0; i <= FIELD_IN; i += TILE_IN) {
      const p = i * SCALE;
      ctx.beginPath(); ctx.moveTo(p, 0);      ctx.lineTo(p, SIZE_PX); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, p);      ctx.lineTo(SIZE_PX, p); ctx.stroke();
    }

    // ⑤ Vértices de tiles (círculos cyan)
    ctx.fillStyle = 'rgba(0, 212, 255, 0.7)';
    for (let x = 0; x <= FIELD_IN; x += TILE_IN) {
      for (let y = 0; y <= FIELD_IN; y += TILE_IN) {
        ctx.beginPath();
        ctx.arc(x * SCALE, y * SCALE, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // ⑥ Etiquetas de tiles (A1…F6)
    ctx.font      = '10px "Share Tech Mono", monospace';
    ctx.fillStyle = 'rgba(0, 212, 255, 0.35)';
    ctx.textAlign = 'left';
    const cols = 'ABCDEF';
    for (let c = 0; c < 6; c++) {
      for (let r = 0; r < 6; r++) {
        ctx.fillText(cols[c] + (r + 1), c * TILE_IN * SCALE + 5, r * TILE_IN * SCALE + 14);
      }
    }
  }

  /* ── Rulers (pies 0–12) ── */
  ['rulerX', 'rulerY'].forEach(id => {
    const el = document.getElementById(id);
    for (let i = 0; i <= 12; i++) {
      const d = document.createElement('div');
      d.textContent = (i === 0 || i === 12) ? i + 'ft' : i;
      el.appendChild(d);
    }
  });

  /* ── Cursor: coordenadas en tiempo real ── */
  const cursorEl = document.getElementById('cursorPos');
  canvas.addEventListener('mousemove', e => {
    const r  = canvas.getBoundingClientRect();
    const px = e.clientX - r.left;
    const py = e.clientY - r.top;
    cursorEl.textContent =
      `(${(px/SCALE).toFixed(1)}in, ${(py/SCALE).toFixed(1)}in) / ` +
      `(${(px/SCALE/12).toFixed(2)}ft, ${(py/SCALE/12).toFixed(2)}ft)`;
  });
  canvas.addEventListener('mouseleave', () => { cursorEl.textContent = '—'; });
</script>
</body>
</html>
