<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polirobots Dagaforce: Autons Maker</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0a0e14;
      --border:  #1f2d40;
      --accent:  #00d4ff;
      --accent2: #ff4d4d;
      --text:    #c9d1d9;
      --muted:   #4a5568;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    header {
      width: 100%;
      max-width: 780px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
    }

    header span {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .legend {
      display: flex;
      gap: 24px;
      margin-bottom: 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
    }

    .legend-item { display: flex; align-items: center; gap: 8px; color: var(--muted); }
    .legend-swatch { width: 28px; height: 3px; border-radius: 2px; }
    .swatch-tile   { background: var(--accent); }
    .swatch-inch   { background: rgba(255,255,255,0.25); }
    .swatch-border { background: var(--accent2); }

    .ruler-x {
      display: flex;
      justify-content: space-between;
      width: 576px;
      margin-bottom: 4px;
      padding: 0 2px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .ruler-y-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .ruler-y {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 576px;
      padding: 2px 0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-align: right;
    }

    .field-wrapper {
      position: relative;
      border: 2px solid var(--accent2);
      box-shadow: 0 0 0 1px var(--border),
                  0 0 32px rgba(255, 77, 77, 0.15);
      overflow: hidden;  /* recorta lo que salga del canvas al hacer pan */
    }

    canvas {
      display: block;
      cursor: grab;
    }

    canvas.grabbing { cursor: grabbing; }

    .info-bar {
      margin-top: 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 1px;
      display: flex;
      gap: 32px;
    }

    .info-bar span { color: var(--accent); }
  </style>
</head>
<body>

  <header>
    <h1>Dagaforce Tool</h1>
    <span>By: DevMaxD</span>
  </header>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-tile"></div>Línea de azulejo (2 ft)</div>
    <div class="legend-item"><div class="legend-swatch swatch-inch"></div>Línea de pulgada (1 in)</div>
    <div class="legend-item"><div class="legend-swatch swatch-border"></div>Borde del campo</div>
  </div>

  <div class="ruler-x" id="rulerX"></div>

  <div class="ruler-y-wrapper">
    <div class="ruler-y" id="rulerY"></div>
    <div class="field-wrapper">
      <canvas id="field" width="576" height="576"></canvas>
    </div>
  </div>

  <div class="info-bar">
    <div>CAMPO: <span>144 × 144 in</span></div>
    <div>TILES: <span>6 × 6</span></div>
    <div>ZOOM: <span id="zoomVal">1.00×</span></div>
    <div>CURSOR: <span id="cursorPos">—</span></div>
  </div>

<script>
  /* ── Constantes del campo ── */
  const FIELD_IN = 144;
  const TILE_IN  = 24;
  const SCALE    = 4;          // px base por pulgada
  const SIZE_PX  = FIELD_IN * SCALE; // 576

  const canvas   = document.getElementById('field');
  const ctx      = canvas.getContext('2d');
  const zoomEl   = document.getElementById('zoomVal');
  const cursorEl = document.getElementById('cursorPos');

  /* ── Estado zoom/pan ── */
  let zoom   = 1;
  let panX   = 0;
  let panY   = 0;

  const ZOOM_MIN  = 1;
  const ZOOM_MAX  = 10;
  const ZOOM_STEP = 0.12;

  /* ── Imagen de fondo ── */
  const fieldImg = new Image();
  fieldImg.onload  = () => render();
  fieldImg.onerror = () => render();
  fieldImg.src = 'TOP.png';

  /* ═══════════════════════════════════════
     RENDER — aplica transformación y dibuja
  ═══════════════════════════════════════ */
  function render() {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, SIZE_PX, SIZE_PX);
    ctx.restore();

    /* Aplica zoom centrado en panX/panY */
    ctx.save();
    ctx.translate(panX, panY);
    ctx.scale(zoom, zoom);

    /* ① Imagen del campo */
    if (fieldImg.complete && fieldImg.naturalWidth > 0) {
      ctx.drawImage(fieldImg, 0, 0, SIZE_PX, SIZE_PX);
    } else {
      ctx.fillStyle = '#0d1a10';
      ctx.fillRect(0, 0, SIZE_PX, SIZE_PX);
    }

    /* ② Grid de pulgadas */
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth   = 0.5 / zoom;
    for (let i = 1; i < FIELD_IN; i++) {
      if (i % TILE_IN === 0) continue;
      const p = i * SCALE;
      ctx.beginPath(); ctx.moveTo(p, 0);      ctx.lineTo(p, SIZE_PX); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, p);      ctx.lineTo(SIZE_PX, p); ctx.stroke();
    }

    /* ③ Vértices de pulgadas */
    const dotR = Math.max(0.5, 0.75 / zoom);
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    for (let x = 0; x <= FIELD_IN; x++) {
      for (let y = 0; y <= FIELD_IN; y++) {
        if (x % TILE_IN === 0 && y % TILE_IN === 0) continue;
        ctx.fillRect(x * SCALE - dotR, y * SCALE - dotR, dotR * 2, dotR * 2);
      }
    }

    /* ④ Grid de tiles */
    ctx.strokeStyle = 'rgba(0, 212, 255, 0.35)';
    ctx.lineWidth   = 1.2 / zoom;
    for (let i = 0; i <= FIELD_IN; i += TILE_IN) {
      const p = i * SCALE;
      ctx.beginPath(); ctx.moveTo(p, 0);      ctx.lineTo(p, SIZE_PX); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, p);      ctx.lineTo(SIZE_PX, p); ctx.stroke();
    }

    /* ⑤ Vértices de tiles */
    ctx.fillStyle = 'rgba(0, 212, 255, 0.7)';
    for (let x = 0; x <= FIELD_IN; x += TILE_IN) {
      for (let y = 0; y <= FIELD_IN; y += TILE_IN) {
        ctx.beginPath();
        ctx.arc(x * SCALE, y * SCALE, 3 / zoom, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    /* ⑥ Etiquetas de tiles */
    const fontSize = Math.max(6, 10 / zoom);
    ctx.font      = `${fontSize}px "Share Tech Mono", monospace`;
    ctx.fillStyle = 'rgba(0, 212, 255, 0.35)';
    ctx.textAlign = 'left';
    const cols = 'ABCDEF';
    for (let c = 0; c < 6; c++) {
      for (let r = 0; r < 6; r++) {
        ctx.fillText(cols[c] + (r + 1),
          c * TILE_IN * SCALE + 5 / zoom,
          r * TILE_IN * SCALE + 14 / zoom);
      }
    }

    ctx.restore();
  }

  /* ═══════════════════════════════════════
     ZOOM con rueda del mouse
     — El punto bajo el cursor queda fijo —
  ═══════════════════════════════════════ */
  canvas.addEventListener('wheel', e => {
    e.preventDefault();

    const rect    = canvas.getBoundingClientRect();
    const mouseX  = e.clientX - rect.left;   // posición en el canvas
    const mouseY  = e.clientY - rect.top;

    const delta   = e.deltaY < 0 ? 1 : -1;
    const factor  = 1 + delta * ZOOM_STEP;
    const newZoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, zoom * factor));

    /* Ajustar pan para que el punto bajo el cursor no se mueva */
    panX = mouseX - (mouseX - panX) * (newZoom / zoom);
    panY = mouseY - (mouseY - panY) * (newZoom / zoom);

    zoom = newZoom;

    /* Limitar pan para no dejar el canvas vacío */
    clampPan();

    zoomEl.textContent = zoom.toFixed(2) + '×';
    render();
  }, { passive: false });

  /* ═══════════════════════════════════════
     PAN arrastrando con el mouse
  ═══════════════════════════════════════ */
  let dragging  = false;
  let lastMouseX = 0;
  let lastMouseY = 0;

  canvas.addEventListener('mousedown', e => {
    dragging   = true;
    lastMouseX = e.clientX;
    lastMouseY = e.clientY;
    canvas.classList.add('grabbing');
  });

  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - lastMouseX;
    const dy = e.clientY - lastMouseY;
    lastMouseX = e.clientX;
    lastMouseY = e.clientY;

    panX += dx;
    panY += dy;
    clampPan();
    render();
  });

  window.addEventListener('mouseup', () => {
    dragging = false;
    canvas.classList.remove('grabbing');
  });

  /* Impide que el pan deje ver área vacía fuera del campo */
  function clampPan() {
    const fieldSize = SIZE_PX * zoom;
    /* borde derecho/inferior: el campo no puede alejarse a la izquierda/arriba */
    panX = Math.min(0, panX);
    panY = Math.min(0, panY);
    /* borde izquierdo/superior: el campo no puede alejarse a la derecha/abajo */
    panX = Math.max(SIZE_PX - fieldSize, panX);
    panY = Math.max(SIZE_PX - fieldSize, panY);
  }

  /* ═══════════════════════════════════════
     CURSOR: coordenadas en pulgadas y pies
  ═══════════════════════════════════════ */
  canvas.addEventListener('mousemove', e => {
    if (dragging) return;
    const rect  = canvas.getBoundingClientRect();
    const mx    = e.clientX - rect.left;
    const my    = e.clientY - rect.top;

    /* Convertir posición de pantalla → coordenadas del campo */
    const fieldX = (mx - panX) / zoom;
    const fieldY = (my - panY) / zoom;

    const ix = (fieldX / SCALE).toFixed(1);
    const iy = (fieldY / SCALE).toFixed(1);
    const fx = (fieldX / SCALE / 12).toFixed(2);
    const fy = (fieldY / SCALE / 12).toFixed(2);

    cursorEl.textContent = `(${ix}in, ${iy}in) / (${fx}ft, ${fy}ft)`;
  });

  canvas.addEventListener('mouseleave', () => {
    if (!dragging) cursorEl.textContent = '—';
  });

  /* ── Rulers ── */
  ['rulerX', 'rulerY'].forEach(id => {
    const el = document.getElementById(id);
    for (let i = 0; i <= 12; i++) {
      const d = document.createElement('div');
      d.textContent = (i === 0 || i === 12) ? i + 'ft' : i;
      el.appendChild(d);
    }
  });

  /* Render inicial */
  render();
</script>
</body>
</html>
