<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polirobots Dagaforce: Autons Maker</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0a0e14;
      --border:  #1f2d40;
      --accent:  #00d4ff;
      --accent2: #ff4d4d;
      --text:    #c9d1d9;
      --muted:   #4a5568;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    header {
      width: 100%;
      max-width: 780px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
    }

    header span {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .legend {
      display: flex;
      gap: 24px;
      margin-bottom: 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
    }

    .legend-item { display: flex; align-items: center; gap: 8px; color: var(--muted); }
    .legend-swatch { width: 28px; height: 3px; border-radius: 2px; }
    .swatch-tile   { background: var(--accent); }
    .swatch-inch   { background: rgba(255,255,255,0.25); }
    .swatch-border { background: var(--accent2); }

    .ruler-x {
      display: flex;
      justify-content: space-between;
      width: 576px;
      margin-bottom: 4px;
      padding: 0 2px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .ruler-y-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .ruler-y {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 576px;
      padding: 2px 0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-align: right;
    }

    .field-wrapper {
      position: relative;
      border: 2px solid var(--accent2);
      box-shadow: 0 0 0 1px var(--border),
                  0 0 32px rgba(255, 77, 77, 0.15);
      overflow: hidden;
    }

    canvas {
      display: block;
      cursor: crosshair;
    }

    canvas.grabbing { cursor: grabbing; }

    .info-bar {
      margin-top: 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 1px;
      display: flex;
      gap: 32px;
    }

    .info-bar span { color: var(--accent); }
  </style>
</head>
<body>

  <header>
    <h1>Dagaforce Tool</h1>
    <span>By: DevMaxD</span>
  </header>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-tile"></div>Línea de azulejo (2 ft)</div>
    <div class="legend-item"><div class="legend-swatch swatch-inch"></div>Línea de pulgada (1 in)</div>
    <div class="legend-item"><div class="legend-swatch swatch-border"></div>Borde del campo</div>
  </div>

  <div class="ruler-x" id="rulerX"></div>

  <div class="ruler-y-wrapper">
    <div class="ruler-y" id="rulerY"></div>
    <div class="field-wrapper">
      <canvas id="field" width="576" height="576"></canvas>
    </div>
  </div>

  <div class="info-bar">
    <div>CAMPO: <span>144 × 144 in</span></div>
    <div>TILES: <span>6 × 6</span></div>
    <div>ZOOM: <span id="zoomVal">1.00×</span></div>
    <div>CURSOR: <span id="cursorPos">—</span></div>
  </div>

<script>
  /* ── Constantes ── */
  const FIELD_IN = 144;
  const TILE_IN  = 24;
  const SCALE    = 4;
  const SIZE_PX  = FIELD_IN * SCALE;
  const COLS     = 'ABCDEF';

  const canvas   = document.getElementById('field');
  const ctx      = canvas.getContext('2d');
  const zoomEl   = document.getElementById('zoomVal');
  const cursorEl = document.getElementById('cursorPos');

  /* ── Zoom / pan ── */
  let zoom = 1, panX = 0, panY = 0;
  const ZOOM_MIN = 1, ZOOM_MAX = 10, ZOOM_STEP = 0.12;

  /* ── Snap ── */
  let snapVertex = null;   // { ix, iy } enteros en pulgadas

  /* ── Tooltip animation ── */
  const TOOLTIP_DELAY = 900;   // ms quieto antes de mostrar
  const ANIM_IN_DUR   = 260;   // ms fade-in + slide
  let hoverTimer     = null;
  let tooltipVisible = false;
  let animStart      = null;
  let animProgress   = 0;      // 0 → 1
  let rafId          = null;

  /* ── Imagen de fondo ── */
  const fieldImg = new Image();
  fieldImg.onload  = () => render();
  fieldImg.onerror = () => render();
  fieldImg.src = 'TOP.png';

  /* ── Easing ── */
  const easeOutExpo = t => t >= 1 ? 1 : 1 - Math.pow(2, -10 * t);

  /* ── Formato con coma ── */
  const fmt = v => v.toFixed(1).replace('.', ',');

  /* ═══════════════════════════════════
     ANIMATION LOOP (tooltip solamente)
  ═══════════════════════════════════ */
  function startTooltipAnim() {
    tooltipVisible = true;
    animStart      = null;
    animProgress   = 0;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(function loop(ts) {
      if (!animStart) animStart = ts;
      animProgress = Math.min(1, (ts - animStart) / ANIM_IN_DUR);
      render();
      if (animProgress < 1) rafId = requestAnimationFrame(loop);
      else rafId = null;
    });
  }

  function stopTooltip() {
    tooltipVisible = false;
    animProgress   = 0;
    animStart      = null;
    if (rafId)      { cancelAnimationFrame(rafId); rafId = null; }
    if (hoverTimer) { clearTimeout(hoverTimer); hoverTimer = null; }
  }

  /* ═══════════════════════════════════
     RENDER PRINCIPAL
  ═══════════════════════════════════ */
  function render() {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, SIZE_PX, SIZE_PX);
    ctx.restore();

    ctx.save();
    ctx.translate(panX, panY);
    ctx.scale(zoom, zoom);

    /* ① Fondo / imagen */
    if (fieldImg.complete && fieldImg.naturalWidth > 0) {
      ctx.drawImage(fieldImg, 0, 0, SIZE_PX, SIZE_PX);
    } else {
      ctx.fillStyle = '#0d1a10';
      ctx.fillRect(0, 0, SIZE_PX, SIZE_PX);
    }

    /* ② Grid de pulgadas */
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth   = 0.5 / zoom;
    for (let i = 1; i < FIELD_IN; i++) {
      if (i % TILE_IN === 0) continue;
      const p = i * SCALE;
      ctx.beginPath(); ctx.moveTo(p, 0);     ctx.lineTo(p, SIZE_PX); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, p);     ctx.lineTo(SIZE_PX, p); ctx.stroke();
    }

    /* ③ Vértices de pulgadas */
    const dotR = Math.max(0.5, 0.75 / zoom);
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    for (let x = 0; x <= FIELD_IN; x++) {
      for (let y = 0; y <= FIELD_IN; y++) {
        if (x % TILE_IN === 0 && y % TILE_IN === 0) continue;
        ctx.fillRect(x * SCALE - dotR, y * SCALE - dotR, dotR * 2, dotR * 2);
      }
    }

    /* ④ Grid de tiles */
    ctx.strokeStyle = 'rgba(0, 212, 255, 0.35)';
    ctx.lineWidth   = 1.2 / zoom;
    for (let i = 0; i <= FIELD_IN; i += TILE_IN) {
      const p = i * SCALE;
      ctx.beginPath(); ctx.moveTo(p, 0);     ctx.lineTo(p, SIZE_PX); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, p);     ctx.lineTo(SIZE_PX, p); ctx.stroke();
    }

    /* ⑤ Vértices de tiles */
    ctx.fillStyle = 'rgba(0, 212, 255, 0.7)';
    for (let x = 0; x <= FIELD_IN; x += TILE_IN) {
      for (let y = 0; y <= FIELD_IN; y += TILE_IN) {
        ctx.beginPath();
        ctx.arc(x * SCALE, y * SCALE, 3 / zoom, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    /* ⑥ Etiquetas de tiles */
    const fontSize = Math.max(6, 10 / zoom);
    ctx.font      = `${fontSize}px "Share Tech Mono", monospace`;
    ctx.fillStyle = 'rgba(0, 212, 255, 0.35)';
    ctx.textAlign = 'left';
    for (let c = 0; c < 6; c++) {
      for (let r = 0; r < 6; r++) {
        ctx.fillText(COLS[c] + (r + 1),
          c * TILE_IN * SCALE + 5 / zoom,
          r * TILE_IN * SCALE + 14 / zoom);
      }
    }

    ctx.restore();

    /* ⑦ Overlay (coordenadas de pantalla) */
    if (snapVertex) drawOverlay();
  }

  /* ═══════════════════════════════════
     OVERLAY — círculo + tooltip
  ═══════════════════════════════════ */
  function drawOverlay() {
    const { ix, iy } = snapVertex;
    const sx = panX + ix * SCALE * zoom;
    const sy = panY + iy * SCALE * zoom;

    /* — Círculo rojo simple — */
    ctx.save();
    ctx.strokeStyle = 'rgba(255, 77, 77, 0.9)';
    ctx.lineWidth   = 1.8;
    ctx.shadowColor = 'rgba(255, 77, 77, 0.4)';
    ctx.shadowBlur  = 7;
    ctx.beginPath();
    ctx.arc(sx, sy, 7, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    /* — Tooltip — */
    if (!tooltipVisible || animProgress <= 0) return;

    const t     = easeOutExpo(animProgress);
    const alpha = t;
    const slide = (1 - t) * 8;   // baja 8px al aparecer, luego sube (entra desde abajo)

    /* Datos */
    const colIdx = Math.min(5, Math.floor(ix / TILE_IN));
    const rowIdx = Math.min(5, Math.floor(iy / TILE_IN));
    const tile   = COLS[colIdx] + (rowIdx + 1);
    const relX   = ix - colIdx * TILE_IN;
    const relY   = iy - rowIdx * TILE_IN;

    const line1 = `${fmt(ix)}, ${fmt(iy)} in`;
    const line2 = `${tile}  ·  ${fmt(relX)}, ${fmt(relY)} in`;

    /* Medir textos */
    const F1 = '500 12px "Roboto Mono", monospace';
    const F2 = '400 10px "Roboto Mono", monospace';
    ctx.font = F1; const w1 = ctx.measureText(line1).width;
    ctx.font = F2; const w2 = ctx.measureText(line2).width;

    const padX = 13, padY = 9, gap = 5;
    const h1 = 13, h2 = 11;
    const bw  = Math.max(w1, w2) + padX * 2;
    const bh  = padY * 2 + h1 + gap + h2;
    const rr  = 4;

    /* Posición: arriba-derecha con rebote */
    let tx = sx + 12;
    let ty = sy - bh - 12;
    if (tx + bw > SIZE_PX - 6) tx = sx - bw - 12;
    if (ty < 4)               ty = sy + 14;
    if (ty + bh > SIZE_PX - 6) ty = SIZE_PX - bh - 6;

    ty += slide;

    ctx.save();
    ctx.globalAlpha = alpha;

    /* Sombra elevada */
    ctx.shadowColor   = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur    = 20;
    ctx.shadowOffsetY = 6;

    /* Fondo */
    ctx.fillStyle = '#111827';   // gray-900 Material tone
    rRect(ctx, tx, ty, bw, bh, rr);
    ctx.fill();

    /* Borde izquierdo (acento rojo, estilo Android) */
    ctx.shadowBlur    = 0;
    ctx.shadowOffsetY = 0;
    ctx.fillStyle     = '#ff4d4d';
    rRect(ctx, tx, ty + 7, 3, bh - 14, 1.5);
    ctx.fill();

    /* Divisor interno */
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth   = 1;
    const divY = ty + padY + h1 + gap * 0.5;
    ctx.beginPath();
    ctx.moveTo(tx + padX + 6, divY);
    ctx.lineTo(tx + bw - padX, divY);
    ctx.stroke();

    /* Línea 1 — posición absoluta, blanco suave */
    ctx.font         = F1;
    ctx.fillStyle    = 'rgba(225, 235, 255, 0.93)';
    ctx.textAlign    = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(line1, tx + padX + 6, ty + padY);

    /* Línea 2 — tile · relativo, cyan atenuado */
    ctx.font      = F2;
    ctx.fillStyle = 'rgba(0, 212, 255, 0.6)';
    ctx.fillText(line2, tx + padX + 6, ty + padY + h1 + gap);

    ctx.restore();
  }

  /* ── Rounded rect helper ── */
  function rRect(c, x, y, w, h, r) {
    c.beginPath();
    c.moveTo(x + r, y);
    c.lineTo(x + w - r, y);
    c.arcTo(x + w, y, x + w, y + r, r);
    c.lineTo(x + w, y + h - r);
    c.arcTo(x + w, y + h, x + w - r, y + h, r);
    c.lineTo(x + r, y + h);
    c.arcTo(x, y + h, x, y + h - r, r);
    c.lineTo(x, y + r);
    c.arcTo(x, y, x + r, y, r);
    c.closePath();
  }

  /* ═══════════════════════════════════
     ZOOM
  ═══════════════════════════════════ */
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect    = canvas.getBoundingClientRect();
    const mouseX  = e.clientX - rect.left;
    const mouseY  = e.clientY - rect.top;
    const newZoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, zoom * (1 + (e.deltaY < 0 ? 1 : -1) * ZOOM_STEP)));

    panX = mouseX - (mouseX - panX) * (newZoom / zoom);
    panY = mouseY - (mouseY - panY) * (newZoom / zoom);
    zoom = newZoom;

    clampPan();
    zoomEl.textContent = zoom.toFixed(2) + '×';
    render();
  }, { passive: false });

  /* ═══════════════════════════════════
     PAN
  ═══════════════════════════════════ */
  let dragging = false, lastMouseX = 0, lastMouseY = 0;

  canvas.addEventListener('mousedown', e => {
    dragging = true; lastMouseX = e.clientX; lastMouseY = e.clientY;
    canvas.classList.add('grabbing');
    stopTooltip();
  });

  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    panX += e.clientX - lastMouseX; panY += e.clientY - lastMouseY;
    lastMouseX = e.clientX; lastMouseY = e.clientY;
    clampPan(); render();
  });

  window.addEventListener('mouseup', () => { dragging = false; canvas.classList.remove('grabbing'); });

  function clampPan() {
    const fs = SIZE_PX * zoom;
    panX = Math.min(0, Math.max(SIZE_PX - fs, panX));
    panY = Math.min(0, Math.max(SIZE_PX - fs, panY));
  }

  /* ═══════════════════════════════════
     CURSOR + SNAP
  ═══════════════════════════════════ */
  canvas.addEventListener('mousemove', e => {
    if (dragging) return;

    const rect = canvas.getBoundingClientRect();
    const inX  = ((e.clientX - rect.left) - panX) / zoom / SCALE;
    const inY  = ((e.clientY - rect.top)  - panY) / zoom / SCALE;

    cursorEl.textContent = `(${inX.toFixed(1)}in, ${inY.toFixed(1)}in) / (${(inX/12).toFixed(2)}ft, ${(inY/12).toFixed(2)}ft)`;

    const cIX = Math.max(0, Math.min(FIELD_IN, Math.round(inX)));
    const cIY = Math.max(0, Math.min(FIELD_IN, Math.round(inY)));

    if (!snapVertex || snapVertex.ix !== cIX || snapVertex.iy !== cIY) {
      snapVertex = { ix: cIX, iy: cIY };
      stopTooltip();
      render();
      hoverTimer = setTimeout(startTooltipAnim, TOOLTIP_DELAY);
    }
  });

  canvas.addEventListener('mouseleave', () => {
    if (dragging) return;
    snapVertex = null;
    stopTooltip();
    cursorEl.textContent = '—';
    render();
  });

  /* ── Rulers ── */
  ['rulerX', 'rulerY'].forEach(id => {
    const el = document.getElementById(id);
    for (let i = 0; i <= 12; i++) {
      const d = document.createElement('div');
      d.textContent = (i === 0 || i === 12) ? i + 'ft' : i;
      el.appendChild(d);
    }
  });

  render();
</script>
</body>
</html>
